<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRRMO Live Emergency Notes</title>
<style>
body { margin: 0; font-family: "Segoe UI", monospace; background: #0b0f14; color: #fff; }
header { background: #8b0000; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; letter-spacing: 1px; }
.status { text-align: center; font-size: 12px; padding: 5px; background: #111; color: #00ffcc; }
textarea { width: 100%; height: calc(100vh - 80px); border: none; outline: none; resize: none; padding: 20px; font-size: 18px; background: #0b0f14; color: #00ffcc; }
textarea::placeholder { color: #555; }
footer { position: fixed; bottom: 0; width: 100%; background: #111; color: #888; text-align: center; padding: 5px; font-size: 11px; }
</style>
</head>
<body>

<header>🚨 DRRMO LIVE EMERGENCY NOTES 🚨</header>
<div class="status">● LIVE SYNC ACTIVE</div>
<textarea id="note" placeholder="Type emergency updates here..."></textarea>
<footer>Emergency Dispatch System | Live Mode</footer>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// 🔹 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAGUja1W_jcf6-Wze-kTu4mAPIOMUNqsho",
  authDomain: "drrmo-notes-v2.firebaseapp.com",
  databaseURL: "https://drrmo-notes-v2-default-rtdb.firebaseio.com/",
  projectId: "drrmo-notes-v2",
  storageBucket: "drrmo-notes-v2.firebasestorage.app",
  messagingSenderId: "481037900330",
  appId: "1:481037900330:web:2112e52012a2ccd890c153"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const noteRef = db.ref("sharedNote");
const textarea = document.getElementById("note");

// Send updates to Firebase
textarea.addEventListener("input", () => {
  noteRef.set(textarea.value);
});

// Receive updates from Firebase
noteRef.on("value", (snapshot) => {
  const val = snapshot.val() || "";
  if (textarea.value !== val) {
    textarea.value = val;
  }
});
</script>

</body>
</html>
